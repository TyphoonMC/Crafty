run:
  timeout: 5m
  go: '1.22'
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - revive
    - bodyclose
    - nolintlint
    - prealloc
    - copyloopvar

linters-settings:
  goimports:
    local-prefixes: github.com/TyphoonMC/Crafty
  gosec:
    excludes:
      - G104
      - G304
  revive:
    rules:
      - name: var-naming
      - name: exported
        severity: warning
        disabled: true
  gocritic:
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
